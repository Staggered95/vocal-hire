name: VocalHire Production Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH into EC2 and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "🚀 Starting VocalHire Deployment..."
            
            # Navigate to where you clone the repo on your EC2
            # (Change 'vocal-hire' to whatever your actual folder is named on the server)
            cd ~/vocal-hire
            
            echo "📥 Pulling latest code from GitHub..."
            git pull origin main
            
            echo "🔧 Navigating to backend to trigger Docker..."
            cd backend
            
            echo "🐳 Rebuilding and restarting Docker containers..."
            sudo docker compose up -d --build
            
            echo "✅ Deployment Successful!"